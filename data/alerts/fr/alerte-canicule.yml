  Alerte canicule : soyez vigilants
level: warning
content: >-
  <p> Météo-France a placé le département   d'Ille-et-Vilaine en vigilance orange canicule.   Les fortes chaleurs devraient perdurer jusqu'au jeudi 28 mai. La Ville de   Rennes est mobilisée pour prévenir leurs effets sanitaires et protéger la   population.  </p>
