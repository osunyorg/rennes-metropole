content: >-
  <p>Le  département d'Ille-et-Vilaine est placé ce lundi 4 mai 2026 en vigilance jaune pour risque d'orages. Des rafales de vent pourraient atteindre 95km/h, entre 15h ce jour et mercredi 8h, et être accompagnées de fortes précipitations.     </p>
