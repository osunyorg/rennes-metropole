title: >-
  Vigilance pluie et inondation
level: info
content: >-
  <p>                     De fortes pluies ont modifié ce jour l'état des cours d'eau. Les précipitations pourraient atteindre ce soir l'équivalent d'une pluie cinquentenale. Un premier débordement est à prévoir ce soir sur les Prairies Saint Martin. Réaction possible sur les étangs d'Apigné et La Flume également. Soyez vigilants.</p>
