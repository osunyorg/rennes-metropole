  Vigilance jaune Orages et Canicule
level: info
content: >-
  <p> Météo France a abaissé l'Ille-et-Vilaine en vigilance jaune Canicule à partir du mercredi 15 juillet. Le département est également classé en vigilance jaune Orages de 9h à 21h.  Restez vigilants.</p>
