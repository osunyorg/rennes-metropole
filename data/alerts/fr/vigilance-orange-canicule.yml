  Orages : vigilance orange à partir de 15h
level: warning
content: >-
  <p>Météo France place l'Ille-et-Vilaine en vigilance orange Orages de 15h à 21h mercredi 15 juillet. Les orages pourraient être localement forts et pluvieux. Soyez vigilants. Par ailleurs, le département est en vigilance jaune Canicule.</p>
