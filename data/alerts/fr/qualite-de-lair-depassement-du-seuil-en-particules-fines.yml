  <p>    La qualité de l'air est actuellement dégradée sur toute l'Ille-et-Vilaine, avec des niveaux élevés de particules fines. Retrouvez les recommandations sur le site d'airbreizh. Le STAR met en place le Pass Qualité de l'Air qui permet de circuler pour 1,70 € sur l'ensemble du réseau bus + métro, toute la journée.    </p>
